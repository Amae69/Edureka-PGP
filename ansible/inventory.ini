[jenkins]
jenkins_server ansible_host=<JENKINS_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/ap-linux-kp.pem

[app]
app_server ansible_host=<APP_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/ap-linux-kp.pem

[monitoring]
monitoring_server ansible_host=<MONITORING_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/ap-linux-kp.pem
