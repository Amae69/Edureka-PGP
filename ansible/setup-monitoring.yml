---
- name: Setup Monitoring Server
  hosts: monitoring
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Download Prometheus
      get_url:
        url: https://github.com/prometheus/prometheus/releases/download/v2.47.0/prometheus-2.47.0.linux-amd64.tar.gz
        dest: /tmp/prometheus.tar.gz

    - name: Extract Prometheus
      unarchive:
        src: /tmp/prometheus.tar.gz
        dest: /tmp/
        remote_src: yes

    - name: Install Prometheus
      shell: |
        cp -r /tmp/prometheus-2.47.0.linux-amd64 /opt/prometheus
      args:
        creates: /opt/prometheus

    - name: Create Prometheus user
      user:
        name: prometheus
        system: yes
        shell: /bin/false

    - name: Set permissions
      file:
        path: /opt/prometheus
        state: directory
        owner: prometheus
        group: prometheus
        recurse: yes

    - name: Create Prometheus data directory
      file:
        path: /opt/prometheus/data
        state: directory
        owner: prometheus
        group: prometheus
        mode: '0755'

    - name: Deploy Prometheus configuration
      copy:
        dest: /opt/prometheus/prometheus.yml
        owner: prometheus
        group: prometheus
        content: |
          global:
            scrape_interval: 15s
            evaluation_interval: 15s

          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']

            - job_name: 'node_exporter'
              static_configs:
                - targets: ['{{ app_server_ip }}:9100']
                  labels:
                    instance: 'app-server'

    - name: Create Prometheus Service
      copy:
        dest: /etc/systemd/system/prometheus.service
        content: |
          [Unit]
          Description=Prometheus
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=prometheus
          Group=prometheus
          Type=simple
          ExecStart=/opt/prometheus/prometheus \
            --config.file=/opt/prometheus/prometheus.yml \
            --storage.tsdb.path=/opt/prometheus/data

          [Install]
          WantedBy=multi-user.target

    - name: Start Prometheus
      systemd:
        name: prometheus
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Install required packages for Grafana
      apt:
        name:
          - apt-transport-https
          - software-properties-common
          - wget
        state: present

    - name: Add Grafana GPG key
      apt_key:
        url: https://packages.grafana.com/gpg.key
        state: present

    - name: Add Grafana repository
      apt_repository:
        repo: deb https://packages.grafana.com/oss/deb stable main
        state: present

    - name: Install Grafana
      apt:
        name: grafana
        state: present
        update_cache: yes

    - name: Start Grafana
      systemd:
        name: grafana-server
        state: started
        enabled: yes
